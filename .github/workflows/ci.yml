name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6


      - name: Setup Nim
        uses: alaviss/setup-nim@0.1.1
        with:
          version: devel
          path: 'nim'

      - name: Nim version
        run: nim --version

      - name: install deps
        run: |
          sudo apt install libx11-dev libxft-dev libsdl3-dev libsdl3-ttf-dev libsdl2-dev libsdl2-ttf-dev


      - name: Install SDL3 and SDL2
        run: |
          nimble install https://github.com/nim-lang/sdl3
          nimble install https://github.com/nim-lang/sdl2

      - name: Run tests
        run: nim c -r tests/tester.nim
